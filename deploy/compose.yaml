# HyperadaptivAI — Phase A provisional deploy bundle
# Quadlet format stays liquid until Phase E deployment observation (doc 13).
# License tiers: all images MIT/Apache-2.0/PostgreSQL (green tier per doc 08).

services:

  # ── PERSISTENCE POD ──────────────────────────────────────────────────────
  # Business Postgres + pgvector. Temporal NEVER uses this instance.
  postgres-business:
    image: docker.io/pgvector/pgvector:pg16       # MIT/PostgreSQL — green tier
    env_file: secrets/secrets.env       # POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB
    volumes:
      - data-business:/var/lib/postgresql/data   # data — never in image
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── ORCHESTRATION POD ────────────────────────────────────────────────────
  # Temporal's own dedicated Postgres. Business data NEVER touches this instance.
  postgres-temporal:
    image: docker.io/postgres:16.3                # PostgreSQL license — green tier
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    volumes:
      - data-temporal-db:/var/lib/postgresql/data   # data — never in image
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  temporal:
    image: docker.io/temporalio/auto-setup:1.27.2  # MIT — green tier
    depends_on:
      postgres-temporal:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: postgres-temporal
    ports:
      - "127.0.0.1:7233:7233"
    restart: unless-stopped

  temporal-ui:
    image: docker.io/temporalio/ui:2.31.2          # MIT — green tier
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

  # ── HARNESS POD ──────────────────────────────────────────────────────────
  # Temporal worker — Phase B: CRM spine + verb activities + LeadIntakeWorkflow.
  # DB_HOST=postgres-business enforces the two-Postgres hard rule; build_dsn()
  # also has a fail-fast guard at runtime. Schema applied via bootstrap, not here.
  harness-worker:
    build:
      context: ..
      dockerfile: Dockerfile.harness
    depends_on:
      temporal:
        condition: service_started
      postgres-business:
        condition: service_healthy     # wait for DB readiness before worker starts
    env_file:
      - secrets/secrets.env             # POSTGRES_USER / PASSWORD / DB + provider API keys
    environment:
      TEMPORAL_HOST: temporal:7233
      TEMPORAL_TASK_QUEUE: skeleton-queue
      LOG_LEVEL: INFO
      DB_HOST: postgres-business        # config (not secret) — two-DB guard reads this
      DB_PORT: "5432"
      # INFER_ALLOWED_PREFIXES: anthropic/   # comma-separated; defaults to anthropic/
      # INFER_API_BASE:                       # optional; for self-hosted / OpenAI-compatible endpoints
    volumes:
      - ./config:/app/config:ro         # config — mounted read-only
    restart: unless-stopped

# Named volumes — data tier. Never fuse with software or config.
volumes:
  data-business:       # business Postgres data
  data-temporal-db:    # Temporal's own Postgres data
